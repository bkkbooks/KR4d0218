body:
  text: 夾漈遺稿卷一宋鄭樵撰題夾漈草堂并記斯堂本幽泉怪石長松修竹榛橡所叢㑹與時風夜月輕煙浮雲飛禽走獸樵薪所往來之地溪西遺民于其間為堂三間覆茅以居焉斯人也其斯之流也顧其人家不富亦不貧不貴逹亦無病與爾屬相周旋也堂後青松百尺長堂前流水日湯湯西忩盡是農桑域北牖無非花葛鄉罷去精神渾冉冉看來几案尚穰穰不知此物何時了待看臨流自在狂又堂後施柴堂上燒柴門終日似無聊蓼蟲不解知辛苦松鶴何能慰寂寥述作還驚心力盡吟哦早覺鬢毛雕布衣蔬食隨天性休訝巢由不見堯題南山書堂一泓澄徹照人間明月團團落古灣不向奔流隨浪擊獨持髙潔伴雲閒禪房夜靜留清鑑閬苑仙歸墜碧環每到軒前心轉逸了無纎翳可相關穀城山松隱巖青嶂回環畫屏倚晴忩倒入春湖水村村叢樹緑于藍列列行人去如蟻新秧未插水田平髙低隴麥相縱橫黃昏倦客忘歸去孤月亭亭雲外生送芹齊千載清風去不留何人能伴赤松逰乞骸直到骸歸日告老須臨老盡頭元亮園田何處有向平昏嫁幾時休湖州别駕發深省掛却朝冠便自由題溪東草堂春融天氣露微微藥草葱芽脈脈肥植竹舊竿從茂謝栽桃新樹忽芳菲天寒堂上燃柴火日暖溪東解蝨衣興動便擕樽到嶺人生真性莫教違湘妃怨黃埃遊輦轂翳日冷旌旗龍去攀髯逺鸞孤對影微魂沉江縹渺泪染竹依稀枯樹空千載寒松已十圍蘆花深月色燐火劇螢飛橫笛瀟湘暮哀猿何處歸昭君怨長謝椒房草終為薄命身那教蘭蕙質翻與雪霜親臉膩勻脂淺粧殘促恨顰故知關北夜無分漢南春紅泪殘胡月輕衣半洛塵琵琶凄切語愁殺路傍人挽通判黃子方歌成薤露悲秋草正離離昔異修文事今同鬼伯司盾衰雙日落夷惠兩風遺衰俗吾無恨親曾識紫芝昭君解巫山能雨亦能雲宫麗三千杳不聞延夀若為公道筆後人誰識一昭君靈龜潭泉心潄玉開心孔山色挼藍尉眼花著手摩娑溪上石他年來訪汝為家北山巖西風曳曳片雲閒一夜寒泉卧北山倚杖巖頭秋獨望稀踈烟壠是人間東山採藥一掬金丹向晚風山前草木盡龍宫詩書便是神仙味更笑行冲問藥籠過桃花洞田家留飲偶從沼渚過山家灼灼桃花噪暮鴉是處竹籬環草屋人間雞黍話桑麻抱琴靜聽濤聲急對酒閒觀月色奢可笑南陽劉子驥欲尋風土滯京華薌林閒居薌林蒼翠甚極目可吟詩梅子風前落杏花雨後移清溪過半郭孤月隱踈籬寂寂雲山外蕭然獨自知又薌林蒼翠甚霽色繞吾廬四面鳥聲寂一庭月影踈有山皆入坐無日不安居好向墻東卧看人獻子虛晨雨東方斜未徹暝色淡初分宿鳥林中噪凄風葉上聞鐘鳴催過雨星落避行雲獨立草堂內涓涓羣動紛夜雨夜雨瀟瀟至天寒擁敝裘空牀聽幻響獨詠解深憂次第園蔬潤參差漁火幽長江風浪息何日放舟逰村雨荒村常寂寂小雨自涓涓寒氣侵人急野花入目妍看山頻當户聽鳥倍難眠萬事蕭條盡空餘日暮煙澗雨飄飄雨色亂終日誤聞聲釣客呼持笠牧童喜啜羮䡖香樹下滿餘響谷中清為謝登臨者枕流洗耳傾滌愫枳棘何榛榛猿狖不敢下芳苓何燁燁雹霜不敢灑驊騮馳曲囏舉足難寬􅖍所以古之人犁鋤聊自把又天命既倒懸將身費椒糈朝行畏日薄暮行畏齟齬娵娃雖見珍衆嫭心未許展轉溷餔啜敢俟慶雲舉又孤鳳落鷹巢啼麟墜虎穴未能脫蒙茸安得出軒凸迢遞空自倬耀靈久已滅禔身入三門黽勉成吾拙又修身以為弓矯思以為矢立義以為的亦云善擬議嗚呼彼鴻漸進德亦猶水我如駕其說木舌暢所指又八荒有禮樂塗民以耳目五政不得加七賦不能育古今貴天常最厭彼嬰犢嗟哉生不辰霑項滋觳觫又濳天以不䇿濳心以不手天人既和同飛濳均不朽吾生既病勞未敢輕俯首久幽不改操旦夕謀杯酒岷峨自沈冥丘壑難為後又德行尊顔閔股肱卑蕭曹明哲知寢伏文章亦辨髦縱彼攀龍鱗何如掉小舠人生一世間慎勿輕自豪又賢者不飽食何為仕與農聖人不詭時何為世所宗顯晦既有因盛衰亦偶逢先秋而後春俄頃自雍容又金革久不息遐方徒憚指誰為民請命皇天猶未喜茂德自不綏眷眷我梓里傷哉古王道樵夫亦冷齒又嗟余本固陋湛身入花渚未製芙蓉裳已習離騷語綽約雖多姿涕零何如雨季夏遭繁霜天寒不可禦家園示弟槱天下輕黃憲居鄰孰戴良暴田安足較散絹未為狂失劍羞余里還牛讓古鄉家風留不墜少賤自翺翔又竹牀讀史慣土銼勿粘塵灑掃王維德澆鋤郭太仁使才看著屐有道驗時薪小物汝知謹同心作古人又每恨紈綺子交逰半博徒棄家尋有道舍命事名儒風雅非難及今人貴與殊夜深何所囑囑汝似狂夫又讀書經百卷見影豈須驚中夜山精笑寒燈草魅爭脫冠神采足擲樏眼光明面壁吾常事菴題天耐名又佻達慿豪族踈狂自克家看人呼狗竇縱我泛漁槎鑿穴安蜂豕穿籬避管笳如能癡勝黠寒食賀騮驊又誰使余為墨朝朝哭染絲獵鷹才子纍殺虎古人癡早信山宜面休嫌谷可移日光圖史滿炳燭却驚遲又學儉誠佳事慳名豈足居寫多崇厚論讀廢絶交書結客饒傾産破貧纍賣車前人家訓在孫孔未全踈又隻身空後死千卷未酬恩不辱看來世貪生托立言無家稱馬糞何史世龍門負石今愁晚中宵弔屈原夏日題王右丞冬山書屋圖壁間颯颯松濤起闕氷冽呼燈始見王右丞毫毛矜貴逞奇傑揮灑冬山書屋圖巖壑幽櫺坐髙哲數筆蕭瑟天貌寒不盡枯枝不盡雪髙崕崛曲形凄肅驅禽逐獸但松竹傍有一水白于峰千頃奔茫日難昱絹外似覺風慘激大江盡斷船相逐室中之人淡如菊長年手㩦一卷讀忩外蒼虬恣飛瀑欲奪造化齊冷燠天下無幾焦孝然當世寧更有梅福苦吟抱膝此何人乃肻蕭條立煉谷古今書畫技總微貴有嶔崎生眼目我聞孫登居北山隆冬披髮以自覆又聞昔賢暑重裘六月御車鄙王侯二公氣岸皆千里朗月白霜胸際浮名士逆天天不怒冬景能暖夏能秋千載斯人不可致我于畫間得其意揆向髙颷逺逺至筆光墨汁俱吐棄但懸此幅清吾心千巖炎伏曦景熾布褐推車我不避弔采石渡頭將軍石頭城下何紛紛將軍匹馬氣如雲金鼓死兮弓矢休勢失英雄不自由風淅淅兮月沈沈荻花滿岸江水深千年江水留明月一片將軍報國心採茶行春山曉露洗新碧宿鳥倦飛啼石壁手攜桃杖歌行役鳥道紆回愜所適千樹朦朧半含白峰巒髙低如几席我生偃蹇耽幽僻撥草驅煙頻躡屐采采前山慎所擇紫芽嫩緑敢輕擲龍團佳製自往昔我今未酌神先懌安得龜䝉地百尺前種武夷後鄭宅鄭宅為先别駕公所居逢春吸露枝潤澤大招二陸棲魂魄秋水歌效少陵年年秋水崩江石秋水年年連天碧山中草木盡號呼江外魚龍輕虛擲既憐茅屋化飛蓬又嘆蝦蟇共枕席人生變化不可知且聽秋風吹蘿薜負耒歌煙冉冉兮雨紛紛負耒耜兮出柴門出柴門兮踏行雲茫茫山色天未分相率歌吟兮樂耕耘插秧歌漠漠兮水田裊裊兮輕煙布榖啼兮人比肩縱橫兮陌阡餉饁歌提筐兮阡陌花紅兮衣白步遲遲兮心迫迫行至止兮嗟于役低聲相勞兮日其夕漫興野鳥日啼户外凉風時入簾間老夫夢後欹枕稚子病中解顔又陋巷顔回早死柴桑陶令長生逹觀千載兒戲厭見一時利名又門前半畝禾苗日午翠色可描笑問耦耕沮溺何勞蓑笠終朝又今古去來有數乾坤闔闢無涯人生行雲流水處世運甕搬柴又初秋一雨新凉子夜長吟未央階下花枝冷艷堂前佛火微茫又壺山八面蒼翠蘭水一泓漣漪容我放歌問渡慿誰拄杖支頥又空山無人堅卧冷竈有飯晚餐安得原憲與語雪霜不受天寒又花下閒傾濁酒人前莫道清貧殘生全無奢願嵗月徙倚竹筠又臨水時思下釣閉門聊學吞羶一身苦樂無定萬事安危有天又鄰沽數盞微醉坦腹北忩短眠風送松濤聒耳驚回夢蝶翩翩福寧州藍溪寺前䝉井靜涵空碧色㵼自翠微巔品題當第一不讓慧山泉夾漈遺稿卷一
