body:
  text: 夾漈遺稿别集類三宋提要臣等謹案夾漈遺稿三巻宋鄭樵撰樵字漁仲莆田人居夾漈山中自稱溪西遺民紹興間以薦得召對授右廸功郎兵部架閣尋改監潭州南嶽廟給札歸鈔所著通志書成入為樞宻院編修生平鋭于著述已成者凡四十一種未成者八種並見于所作獻皇帝書中故當時以博物洽聞著而未嘗以文章名其集自陳振孫書録解題以下亦皆不著録此本前後無序跋不知何人所編上巻古近體詩五十六首中巻記一篇論一篇書二篇下巻書三篇其詩不甚修飾而蕭散無俗韻其文滉漾恣肆多類唐李觀孫樵劉蜕在宋人中亦自為別調其獻皇帝書自譽甚至上宰相書上方禮部書放言縱論排斥古人秦漢来著述之家無一書能當其意至投宇文樞宻江給事二書置學問而誇抱負益傲睨萬狀不可一世其器量殊嫌淺狭然南北宋間記誦之富考證之勤實未有過于樵者其髙自位置亦非盡無因也觀于是集其學問之始末亦可以見其概矣乾隆四十六年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:ce9b55212f890648fc626a859b8e8a193b488ed8745a818be49a69f8d4f5ff3e
