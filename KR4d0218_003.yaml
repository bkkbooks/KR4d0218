body:
  text: 夾漈遺稿巻三宋鄭樵撰上宰相書十一月十二日興化軍布衣鄭樵以衰老之病不任道途再行遺書獻于相公鈞座樵生為天地間一窮民而無所恨者以一介之士見盡天下之圖書識盡先儒之閫奥山林三十年著書千巻以彼易此所得良已多而斯心所不能自已者其説有五故人曽入京華載書詣相府其一為樵暮齡餘齒形單影隻鉛槧之業甫就汗簡之功已成既無子弟可傳又無名山石室可藏每誦白樂天恐君百嵗後滅冺人不聞賴中藏秘書百代無湮淪之句未嘗不嗚咽流涕㑹兹天理不負夙心仰荷鈞慈果得就秘書省投納蓬山髙迥自隔塵埃芸草芬香永離蠧朽百代之下復何憂焉其二為兵火之後文物蕩然恭惟相公撥灰燼而收簡編障横流而主吾道使周孔之業不墜于地士生此時寧無奮發樵也願討理圖書以自効使東南之圖書已盡今古之圖譜無遺金石之文鼎彛之志莫不陳于前前年五月十三日投納是月二十七日伏䝉提省之晨特與嘉歎既嵗終㑹計指揮收入校讐之籍與先儒之書等嗟乎伯牙之琴為審音而鼓馮驩之鋏為知已而彈此某所以甘心焉其三為修書自是一家作文自是一家修書之人必能文能文之人未必能修書若之何後世皆以文人修書天文之賦萬物也皆不同形故人心之不同猶人面凡賦物不同形然後為造化之妙修書不同體然後為自得之工仲尼取虞夏商周秦晉之書為一書每書之篇語言既殊體制亦異及乎春秋則又異于書矣襲書春秋之作者司馬遷也又與二書不同體以其自成一家言始為自得之書後之史家初無所得自同于馬遷馬遷之書遷之面也假遷之面而為已之面可乎使遷不作則班范以来皆無作矣按馬遷之法得處在表用處在紀傳以其至要者條而為綱以其滋蔓者釐而為目後之史家既自不通司馬遷作表之意是未知遷書之所在也且天下之理不可以不㑹古今之道不可以不通㑹通之義大矣哉仲尼之為書也凡典謨訓誥誓命之書散在天下仲尼㑹其書而為一舉而推之上通于堯舜旁通于秦魯使天下無逸書世代無絶緒然後為成書史家據一代之史不能通前代之史本一書而修不能㑹天下之書而修故後代與前代之事不相因依又諸家之書散落人間靡所底定安得為成書乎樵前年所獻之書以為水不㑹于海則為濫水途不通于夏則為窮途論㑹通之義以為宋中興之後不可無脩書之文脩書之本不可不據仲尼司馬遷㑹通之法萬一使樵有所際㑹得援國朝陳烈徐積與近日胡瑗以命一官本州學教授庶沾寸禄乃克脩濟或以布衣入直得援唐蔣義李雍例與集賢小職亦可以較讐亦可以博極羣書稍有變化之階不負甄陶之力噫自昔聖賢猶不奈命樵獨何者敢有怨尤然窮通之事由天不由人著述之功由人不由天以窮達而廢著述可乎此樵之志所以益堅益勵者也去年到家今日料理文字明年脩書若無病不死笔扎不乏逺則五年近則三載可以成書其書上自羲皇下逮五代集天下之書為一書惟虚言之書不在所用雖曰繼馬遷之作凡例殊途經緯异制自有成法不蹈前修觀春秋地名則樵之地理志异乎諸史之地理觀羣書㑹記則知樵之藝文志異乎諸史之藝文觀樵分野記大象畧之䫫則天文志可知觀樵諡法運祀議鄉飲禮系聲樂府之類則禮樂志可知觀樵之象類書論梵書之類則知樵所作字書非許慎之徒所得而聞觀樵之分音類韻字始連環之類則知樵所作韻書非沈約之徒所得而聞觀本草成書爾雅註詩名物志之類則知樵所識鳥獸草木之名于陸璣郭璞之徒有一日之長觀圖書志集古系時録校讐備論則知樵校讐之集于劉向虞世南之徒有一日之長以此觀之則知樵之脩書㫁不用諸史舊例明騐在前小人豈敢厚誣君子然樵雖林下野人而言句散落人間往往家藏而户有雖鷄林無貿易之價而鄉校有諷誦之童凡有文字屬思之間已為人所知未終篇之間已為人所傳况三十年著書十年搜訪圖書竹頭木屑之積亦云多矣將欲一旦而用之可也嗚呼術業難成風波易起深恐傳者之誤謂擅脩國史將無容焉與景韋兄投宇文樞宻書厚生天地間藜藿二十有八年矣樵生二十有四矣為兒時楚楚便有脱畧流俗志聞君子長者風即規繩矩履不避風雨一求見馬首而還視閭閻輕薄年少蹴􅀈千百輩若躪秋毫始讀古人書而性真率不一一記憶憚作時下文章喜盤詰聱牙風雅古淡易春秋䆳邁欲效之而未能也家貧無文籍聞人家有書直造其門求讀不問其容否讀已則罷去住曾不吝情寒月一窓殘燈一席諷誦逹旦而喉舌不罷勞纔不讀便覺舌本倔强或掩巻推燈就席杜目而坐耳不屬口不誦而心通人或呼之再三莫覺春風二三月間弟兄二人手挈飯囊酒甕貿貿深山中遇竒泉怪石茂林修竹凡可以可人意向者即釋然坐卧一觴一咏累月忘歸山林蓊薈禽鳥不知人来爭食揮之不退牧子樵夫澤藪相逢呼而不就坐即疑為神仙怪物不問姓名睨晲而去或採松食橡澆花種藥隨漁狎獵優游山谷間自得名教中樂地故夏不葛亦凉冬不袍亦温腸不飯亦飽頭髮經月不櫛面目衣裳垢膩相重不洗而貞粹之地油然禮義充足弟兄親戚鄉䣊僚友謂為痴為愚為妄不相輩行也而土木形質又好冲介自守不廣交游以求聞達用是見斥于世彌曠宇宙若無所容焉一見閣下便開懐許可推階前盈尺之地與之吐氣激昻青雲且熟視詳聴了無難色已而旌節顧蘋蘩中挑剔其所不知裁抑其所未及使山野之士聞之色寒盡戴白汗四匝胸中覺無膏肓疾不知周公吐握何以過此而機宜學士落落穆穆精神滿腹居然是出羣之氣其名家駒也不鄙寒微兩屈輿從手授忠恪康濟大畧千萬餘言承顔接詞調欵移時布衣受知于此極矣倘犬馬之骨未墜于地當效首領以報故不敢不盡其所能亦不敢不盡道其所能厚也樵也􅋂﨑歴落可笑人也眷言文賦體物瀏亮籠天地于形内挫萬物于筆端春雲秋月無下手處疑不若屈宋賈馬凴凌造化櫽括風雲所得驚邁絶去翰墨谿徑語出山間筆歸圖畫田夫女子諷道不容口疑不若鮑謝李杜回既倒之狂瀾支已頹之岱嶽澄世所不能澄裁世所不能裁千條析理一緒連文捍壁周孔俾申韓楊墨佛老重足而立疑不若孟荀揚韓天才英俊豪拔不羣朝野挹其風俗人物推其表燭落筆作文言語妙天下干將莫邪難于爭鋒如日出水融焜耀人耳目若不敢正視者疑不若王楊盧駱或掉三寸舌抃縛王公或清持公論收降物議如扣鐘如懸河如玉屑如琴瑟聴之洒洒令人忘倦疑不若蘇張裴樂練達宏博攟摭古今出入羲皇驅馳綿邈如經笥如肉譜如五摠龜如人物志如入宗廟觀禮樂器疑不若遷固向歆經綸韜畧􅀢嵂理窟畫地布棊岌不可犯如入武庫中但見五兵縱横疑不若孫呉英衞乃若義分明于霜信行直如弦平生之言握手入地不軼毛髮厚也樵也仇牧荀息其人也利不可回威不可却義存友道視死如歸瑟然英魄與秋霜爭嚴厚也樵也程嬰杵臼其人也仗節奉使有死無二直挫彪虎而奪之氣其英姿激奮動人毛髪厚也樵也毛遂藺相如其人也岩岩清竒壁立萬仭精神動天威毅貫日其義氣凛凛逼人若有寒色厚也樵也荆軻聶政其人也孤城圍急飛鳥不敢度獨能身質鉄鉞拯危亡于葅醢中壯圖諒節頽嵩華不吾壓使英烈之命不委于草莽厚也樵也解揚其人也鉄腸石心勒忠孝身全君父銜笑就刑生為萬夫雄死為壯士規厚也樵也紀信其人也抱松筠之節嵗寒不凋堂堂直道讋惡豺狼若象牙若犀角嶷若有不可拔氣厚也樵也蘇武其人也膽幹應辨隠有城府搴歙侯之旂斬郅支之首懸旌萬里揚威昆西何其壯哉厚也樵也陳湯其人也生不封侯死不廟食非丈夫也勃勃雄飛氣吞勍敵期以草裹尸而後已厚也樵也馬援其人也標格逸亮洒出物表臺閣生風奸雄斂手砥礪名節慨然有澄清天下志厚也樵也范滂其人也褰裳赴義擲足輕生雖白刄碪骨而峰距不頓嘔肝瀝血號呼欲絶天地聞之無置顔處厚也樵也向雄其人也主憂以辱主辱以死篤在三之義雖則﨑嶇晉陽而端冕繾綣臣節愈恭義血㸃㸃糢糊御服誠疾風中勁草厚也樵也嵇紹其人也張胆厲聲羯首奪色臨刀鋸鼎鑊而言詞益壯吐忠飲憤含胡而絶在今與古蓋千一焉厚也樵也顔杲卿其人也一腔義氣刳奸剔邪而其燄萬丈使蜂毒狼威􅀈然疑阻而不得逞其禍害厚也樵也何蕃其人也擁疲卒嬰孤墉抗方張不測之敵梗其喉牙掣其首尾生雖不能報君死當為鬼以擊賊背裂面血叠尸通道古之烈夫也厚也樵也張巡許逺其人也此志不展則栖遲林野長嘯泉石負耒而耕破北隴春煙叩角而歌殘南山夜月一丘一壑一山一雲便足了一生事下視勢利而胸懐洒洒然者厚也樵也向子平竇孝威其人也然則厚也樵也何人也沉寂人也仁勇人也古所謂能死義之士也謂人生世間一死耳得功而死死無悔得名而死死無悔得義而死死無悔得知已而死死無悔死固無難恨未得死所耳今天子蒙塵蒼生鼎沸典午興亡卜在深源一人耳厚兄弟用甘一死以售功售名售義售知已故比見閣下以求其所也王彦章有言人死留名豹死留皮史臣謂其真忠葢天性也厚樵自卜其兆若胡越相視則知人豈真易哉閣下筦樞庭為天子大臣厚樵風塵布衣在天地間一螻蟻數當代文伯閣下寔司之厚樵未許籍衙官列閣下出入三朝為時元老厚樵黄嘴經生耳且閩蜀相距彌萬里逺近之相懸貴賤之相懸賢不肖之相懸先進後學之相懸其間事宜百數馹舉烽燧傳呼不相及者何以三見問而分不間毛髪葢磁石取鉄以氣相合固有不期然而然者今既蝸吝蠡淺不逃鑒裁當展盡底裡以俟採擇厚逸邁而痴樵幽䆳而愚厚痴絶樵愚絶厚于世俗有領袖樵于人物有林藪厚見理如破竹迎刄而解初無留手樵見理如攻堅木終自擘折稍遲耳厚于文如狂瀾怒濤滚滚不絶樵于文如懸崕絶壁向之瑟然寒人毛骨厚仰視韓愈如不及樵下視李白如常人厚下筆如迅馬歴隴陂終日馳騁而足不頓且無蹶失樵下筆如大匠掄材胸中暗有繩墨每作文文成自不曉其義必求厚為之解説然後胸中曉然者厚常曰吾弟文章合有神助不然何得乃爾厚得之易得樵而後峻樵得之紛得厚而後理厚得樵而城壁固樵得厚而朱紫分厚貞粹之地可容樵千萬輩而峰岠孤峭樵自出厚之右厚應辨多方畧樵遲鈍有隠思厚臨倉卒若素成綽有餘波樵臨倉卒若暴疾昏黄徐而圖之了無一塵相累使厚司臺諫則世無豺虎跡使樵直史苑則地下無寃人智解文鋒氣挫虓虎使于四方不辱君命則厚優于樵正固幹事不避鏌鋣能辛苦其身為紀綱先樵亦優于厚當官正色不畏强禦則厚優于樵小心事君繾綣朝夕樵亦優于厚至當廟廊擁幼君當大節而不可奪則厚能之樵亦能之臨財亷取與義出入無私交之行可為百僚則厚能之樵亦能之斟酌治體如扁鵲治疾盡見五臟凝結解紛排難如庖丁鼓刀無少留刄厚能之樵亦能之厚也樵也平昔囊櫃中短長不出此耳推短論長于閣下有望焉古者將門必有將相門必有相故蕭何之于韓信羊祜之于杜預王導之于紀贍李勣之于戴胄皆相首尾以成功名厚樵生平用心于古人閣下亦以古人許可幸犬馬之齒未在桑榆正當戮力周旋閣下著一鞭于中原使白骨更生寒灰復燃特反掌耳惟閣下置之肝臆而終始之與景韋兄投江給事書國有可賀而弔可弔而賀者士有若達而窮若窮而達者此理甚明而甚幽甚微而甚著知者或失之十五愚者或得之十一得失之機間不容髪請為閣下開叙其端厚樵莆陽田家子也亦經生也非愚非智所恃者胸中無膏肓之疾解紛排難洞肝徹臆遇不平事則熱中振衣逹旦不寐奔往掉赴若將後時用持此説躡屩擔簦不避風雨求見通人而論之得通人則論不得通人則不論也當海宇晏清方隅寧謐長揚羽獵鬬鷹走狗呉姝荆艶盡態極妍時也人以為可賀厚樵以為可弔白刄雲屯蒼生鼎沸天子蒙塵百官連頸宫中生棘雨露霑衣時也人以為可弔厚樵以為可賀昔馮道馳馬之喻得之矣懐黄金帶紫綬乗肥馬廕廣厦美食大觀重門髙第凡此之輩人以為達厚與樵以為窮面色黧黑形神潦倒朝夕藜藿不計飽煖凡此之輩人以為窮厚與樵以為達昔韓退之放荆潭詩序得之矣馮道為河東掌書記時奉使山中過井陘之險躍馬蹶躓不敢怠銜轡及至平地謂無足慮遽跌而傷此無他蹈危者慮深而獲全居安者患生于所忽人之情也請以建武天寳之事以明之開元之際太平之日梨園窮絲桐之妙驪山極土木之役自以為太平磐石之固子孫萬世帝王之業也豈意禍起蕭墻奸生帷幄嬪嬙魚肉乗輿播遷蜀山秋草相對何心厚與樵所謂可賀而弔葢已然之明驗也火徳中微賊臣内擅黄巾赤眉連山亘谷四方之盗如雲而起人謂漢家血食于此已矣世祖赫憤南陽徒步奮呼天下不約而從者摠百萬之師使髙祖之業不絶如綫未幾建武之隆頌聲洋溢豈天意哉或人力也厚樵所謂可弔而賀已然之明騐也退之嘗曰和平之聲淡泊哀思之聲要妙懽愉之詞難工窮苦之言易好此無他憔悴起哀思膏梁生痼疾人情之常也請借諸葛王衍之事以明之典午衣冠以浮虚相誕而夷甫以風流儒雅獨成門户雍容風格洒落人耳目間以為雲天上人矣及臨小患害低頭畏避莫敢支吾頽墻之禍殞身赤族此夷甫之達厚與樵得而窮之也諸葛武侯瑯琊田翁也躬耕隴畝風日刺其肌蔬糲攻其腸㷀㷀然曠四海若不容其軀一旦感㑹于草廬中談笑而取岷蜀君臣相遇以魚水為不若何其一身計之而不足天下計之而有餘此武侯之窮厚與樵得而逹之也以往鑒今正國家可賀之辰而覊旅求達之秋然敵國未羈亭障未肅皇圖未復調發未弭父兄之恥未洒天地憤容日月奪色至尊宵旰貔虎枕戈亦上下愁蹙之時也以厚與樵觀之勁敵不足憂弱卒足憂貧賤不足憂富貴足憂則為厚與樵者易為閣下計者難矣葢艱難之主勤勤則易曉戰勝之兵驕驕則易敗厭亂之俗易成飢渴之民易得况以邉騎之五不當中國之一驅飲憤之民仗義奉辭以吾多筭制彼無筭以吾重地制彼散地以吾鋭氣犯彼歸氣吾專為一彼分為十取用于國因糧于敵險其勢短其節如轉圜石于千仭之山縱不能正藁街之戮長纓之覊亦足以攄生靈之憤刷祖宗之辱兩宫帳殿必不寥寥于穹廬沙漠之鄉也為國計者不亦易乎若今日之兵教導不明典刑不正溺于疲將之手持之失其紀律進無鋭意君有亂心馭之則亂不馭亦亂馭之其亂速不馭其亂遲信乎為兵計之不易也厚與樵野人也身不紆君之紱口不膏君之粟得志則行其義不得志則肥遯山林一丘一壑一觴一詠下視勢利如擺脱鴻毛耳為厚與樵計者不亦易乎若閣下衣人之衣懐人之憂乗人之車載人之患食人之禄死人之事當此時也不能埀尺寸功名以自効使國家無環視之責而臣子之心所以自為者宜何如信乎為閣下之難也然人之所以憂者亦不足憂為國計固易為兵計不難為厚與樵計固易為閣下計亦不難與其進也則狂瞽之見庶禆萬一以所為難者而為易若反手耳奈徳厚信至而未達不敢􅏥辭以求媚如其不遇則天也命也夫復何言且為閣下言之峩冠帶曳裾投刺者或挾親而見或挾故而見或階縁親故先容而後見也迹相仍袂相屬也然有畫一竒吐一䇿為閣下計者乎有人于此親非崔盧故非王貢又無左右介紹為之先容敢仗天下大計堂堂求見閣下謂此人胸中當何如哉世有非常之難又有非常之功又有非常之人豈常人所能賞鑒哉厚與樵見今之士大夫齷齪不圖逺畧無足與計者用自獻于閣下昔蕭何引韓信于行伍鄧禹薦冦恂于偏禆周瑜定交魯肅于閭閻元直推轂孔明于隴畝厚樵誠有望焉嗚呼羽毛既成因風而騰鱗甲已就待雲而興厚樵風雲閣下寔司牧之夾漈遺稿巻三
