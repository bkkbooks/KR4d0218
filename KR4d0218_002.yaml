body:
  text: 夾漈遺稿巻二宋鄭樵撰重修木蘭陂記集三百六十澗摠而為一故有無窮之流斷大川之流析而為二故有無窮之澤此邦民貧不任竭作興木蘭之役者有長樂郡之二人焉始則錢氏之女用十萬緡既成而防决次則林氏之叟復以十萬緡未就而功隳錢氏吐憤遂従曹娥以逰林叟啣寃徒起精衛之忿自兹以還興作乏人惟増望洋之嘆莫克水濱之問且遏長江之勢使洪瀾怒濤不得東之豈人力也哉熈寧初有季長者宏富而能仁故得其稱有此志矣天降異人曰馮智日貰酒于其家三年不索酧將行曰當與子遇于木蘭山前長者先斯而俟乃授以方略夜役鬼物朝成竹樊又圖蒼龍以貽長者投二盒于江一以上覆一以下承而去孺子可教果得黄石之素書衣履不沾又見葛公之涉水長者于是依竹為堤功成不爽鑱石為楹以為禦距楹為障以為瀦壅川之陂循南以濟相其髙下釐為三洫使無偏注行五十餘里逹于海瀕海為四斗門以禦蓄洩凡溉田萬頃使邦無旱暵饑饉之虞百年于兹故長者得以廟食焉山岳之摧由于朽壌江海之注竭于漏巵紹興一十八年之秋陂失故道由北岸而東奔重淵如勺魚鼈焉依三衢馮君元肅適以斯時至凡川澤陂池之事一時畫究謂馬伏波所過州縣必留心灌溉之利况吾丞是邑而専是職乎木蘭之陂吾不得以後時以水昏正而栽之日夜従事九旬而成不愆于素舉鍤成雲决渠成雨父老載塗式歌且舞木蘭兆䜟者二曰逢竹則築又曰水遶壺公山莆陽朱紫半舉一郡之水此水為多畫一邦之利此利為溥使萬井生靈免于溝洫則馮丞之績為可書其辭曰南標銅柱已仆風埃北勒燕然又蝕莓苔孰若賈渠難湮召埭不朽惟川澤之功與天地為長乆沃州之山白氏有緣肇于道猷成于寂然木蘭之陂辱在馮君伊昔甚偉于今有芬嗚呼源清流長千載融融君子之澤不可終窮論秦以詩廢而亡陳君舉曰春秋之衰以禮廢秦之亡以詩廢嘗觀之詩刑政之苛賦役之重天子諸侯朝廷之嚴而后妃夫婦袵席之秘聖人為詩使天下匹夫匹婦之微皆得以言其上宜若啓天下輕君之心然亟諫而不悟顯戮而不戾相與擕持去之而不忍是故湯武之興其民急而不敢去周之衰其民哀而不敢離蓋其抑鬰之氣紓而無聊之意不蓄也嗚呼詩不敢作天下怨極矣卒不能勝共起而亡秦秦亡而後快于是始有匹夫匹婦存亡天下之權嗚呼春秋之衰以禮廢秦之亡以詩廢吾固知公卿大夫之禍速而小民之禍遲而大而詩者正所以維持君臣之道其功用深矣獻皇帝書正月十一日興化軍草萊臣鄭樵昧死百拜獻書于皇帝陛下臣本山林之人入山之初結茅之日其心苦矣其志逺矣欲讀古人之書欲通百家之學欲討六藝之文而為羽翼如此一生則無遺恨忽忽三十年不與人間流通事所以古今之書稍經耳目百家之學粗識門庭惟著述之功百不償一不圖晩景復見太平雖松筠之節不改嵗寒而葵藿之傾難忘日下恭惟皇帝陛下誠格上下孝通神明以天縦之聖著日新之徳君臣道合一言而致中興自書以來未之聞也臣竊見兵火之餘文物無㡬陛下留心聖學篤志斯文擢用儒臣典司東觀于是内外之蔵始有條理百代之典煥然可觀臣伏覩秘書省嵗嵗求書之勤臣雖身在草萊亦欲及兹時效尺寸顧臣究心于此殆有年矣今天下圖書若有若無在朝在野臣雖不一一見之而皆知其名數之所在獨恨無力抄致徒紀記之耳謹搜盡東南遺書搜盡古今圖譜又盡上代之鼎彞與四海之銘碣遺編缺簡各有彞倫大篆梵書亦為釐正于是提數百巻自作之書徒步二千里來趨闕下欲以纎塵而補嵩華欲以涓流而益滄海者也念臣困窮之極而寸隂未嘗虛度風晨雪夜執筆不休厨無煙火而誦記不絶積日積月一簣不虧十年為經旨之學以其所得者作書考作書辨訛作詩傳作詩辨妄作春秋傳作春秋攷作諸經畧作刋謬正俗䟦三年為禮樂之學以其所得者作諡法作運祀議作鄉飲禮作鄉飲駁議作系聲樂府三年為文字之學以其所得者作象類書作字始連環作續汗簡作石鼔文考作梵書編作分音之類五六年為天文地理之學為蟲魚草木之學以天文地理之所得者作春秋地名作百川源委圖作春秋列傳圖作分野記作大象略以蟲魚草木之所得者作爾雅註作詩名物志作本草成書作草木外類以方書之所得者作鶴頂方作食鑑作採治錄作畏惡錄八九年為討論之學為圖譜之學為亡書之學以討論之所得者作羣書㑹紀作校讎備論作書目正訛以圖譜之所得者作圖書志作圖書譜有無記作氏族源以亡書之所得者作求書闕記作求書外記作集古系時錄作集古系地錄此皆已成之書也其未成之書在禮樂則有器服圖在文字則有字書有音讀之書在天文則有天文志在地理則有郡縣遷革志在蟲魚草木則有動植志在圖譜則有氏族志在亡書則有亡書備載二三年間可以就緒如詞章之文論説之集雖多不得而與焉柰秋先蒲栁景迫桑榆兄弟淪亡子姓亦殤惟餘老身形影相弔若一旦倐先朝露則此書與此身俱填溝壑不惟有負于平生亦且有負于明時謹繕冩十八韻百四十巻恭詣檢院投進其餘巻帙稍多恐煩聖覽萬一臣之書有可採望賜睿旨許臣料理餘書續當上進微臣遭遇右文之世寧無奮發之情使臣得展盡底藴然後鶴歸蕙帳狐正首丘庶㡬履陛下之地食陛下之粟不孤為陛下之一民也仰冒天威伏惟聖慈特賜睿覽臣無任瞻天仰聖激切屏營之至臣樵昧死百拜進寄方禮部書樵自讀書螺峰以來念無半席之舊又無葭莩之餘雖辱君子特逹之知欲再通起居又不敢也乃者蔡文郎中以禮部内幅相示不謂平生有此遇也謹厯所以在日月之下不敢孤負寸隂者以陳也樵每嘆天下本無事庸人擾之而事多載籍本無説腐儒惑之而説衆仲尼之道傳之者不得其傳而最能惑人者莫甚于春秋詩耳故欲傳詩以詩之難可以意度明者在于鳥獸草木之名也故先撰本草成書其曰成書者為自舊注外陶𢎞景集名醫别錄而附成之乃為之注釋最為明白自景祐以來諸家補註紛然無紀樵于是集二十家本草及諸方家所言補治之功及諸物名之書所言異名同狀同名異狀之實乃一一纂附其經文為之註釋凡草經諸儒書異錄備于一家書故曰成書曰經有三品合三百六十五種以法天三百六十五度日星經緯以成一嵗也𢎞景以為未備乃取名醫别錄以應嵗之數而兩之樵又别擴諸家以應成嵗而三之自纂成書外其隠微之物留之不足取去之猶可惜也纂三百八十八種曰外類三書既成乃敢傳詩以學所以不識詩者以大小序與毛鄭為之蔽障也不識春秋者以三傳為之蔽障也作原切廣論三百二十篇以辨詩序之妄然後人知自毛鄭以來所傳詩者皆是錄傳又春秋考二十巻以辨三家異同之文春秋所以有三家異同之説各立褒貶之門户者乃各主其文也今春秋考所以攷三家有異同之文者皆是字之訛誤耳乃原其所以訛誤之端由然後人知三傳之錯觀原切廣論雖三尺童子亦知大小序之妄説觀春秋考雖三尺童子亦知三傳之妄辨大小序與三傳之妄然後知樵所以傳春秋得聖人意之由也詩主在樂章而不在文義春秋主在法制亦不在褒貶豈孤寒小子欲斥先賢而為此輕薄之行哉蓋無彼二書以傳其妄則此説無由明學者亦無由信也自古立書埀訓家亦不諱其如此也凡書所言者人情事理可即已意而求黄遇所謂讀百遍理自見也乃若天文地理車輿器服草木蟲魚鳥獸之名不學問雖讀千廻萬復亦無由識也奈何後之淺鮮家只務説人情物理至扵學之所不識者反没其真遇天文則曰此星名遇地理則曰此地名此山名此水名遇草木則曰此草名此木名遇蟲魚則曰此蟲名此魚名遇鳥獸則曰此鳥名此獸名更不言是何狀星何地何山何水何草何木何蟲何魚何鳥何獸也縦有言者亦不過引爾雅以為據耳其實未曽識也然爾雅之作者蓋本當時之語耳古以為此名當其時又名此也自爾雅之後以至今所名者又與爾雅不同矣且如爾雅曰芍鳬蒺藜者以舊名芍今曰鳬茨今曰蒺藜此所以曉後人也乃若所謂术山薊梅柟此又惑人也古曰术當爾雅之時則曰山薊或其土人則曰山薊也古曰梅當爾雅之時則曰柟或其土人則曰柟也今之言者又似古矣謂之术不謂之山薊謂之梅不謂之柟也人若以术為山薊則人必以今术為非术也以梅為柟則人必以今梅為非梅也樵于是注釋爾雅爾雅徃人作是其纂經籍之所難釋者而為此書最有機綜奈何作爾雅之時所名之物與今全别况書生所辨容有是非者樵于所釋者亦不可専守云爾故有此訛誤者則正之有缺者則補之自補之外或恐人不能盡識其状故又有畫圖爾雅之學既了然則六經注疏皆長物也自古箋解家惟杜預一人為寔當者以其明于天文地理耳惜乎不備者謂其不識名物也如五鳩九扈皆不明言其物只引爾雅為據如四凶者天下謂之渾沌窮奇檮杌饕餮杜皆以理説之窮奇以亡窮而好奇檮杌謂頑凶無儔匹之貎樵初甚疑此及見山海經果有此等獸乃知四者為惡獸之名故時人所以比其人也夫以杜預之識一舉不至則有乖脱者如此况他人乎樵于爾雅之外又為天文志以自司馬遷天官書以來諸史各有其志奈何厯官能識星而不能為志史官能為志而不識星不過採諸家之説而合集之耳實無所質正也樵天文志略于灾福之説傳記其實而圖其狀也地理家縁司馬遷無地理書班固以來皆非制作之手雖有書而不能如無也樵為是故作春秋地名雖曰春秋地名其實地理之家無不該貫最有條理也春秋地名外又有郡縣改更焉夫人之所以為人者精神之用耳耳目精神之府也聖賢得其用而為聖賢愚昧失其用而為愚昧耳以接音所辨者言目以接形所别者文學者乃能通此二岐則無所不通矣今世有韻書最多學者不逹聲音之意字書雖多學者不知制作之意樵于是為韻書每韻分宫商徵角羽與半徵半宫是為七音縦横成文蓋本浮屠之家作也故曰分音以文之變自古文籕體而變小篆小篆變隸隸變楷又三代之時諸國不盡同猶今諸畨之所用字皆不同也秦始皇混一車書然後天下之書皆用秦體以其體有不同故曰辨體學者所以不識字書義緣不知正義與借義也且如主字本義則燈炷也故其字象燈炷之形以為主守之主者借義也蓋主守之主與燈炷之主同音故也又如笑字本義則小簫也故其字従竹従夭以為笑語之笑者借義也笑語之笑與簫笛之笑同音故也此之為借音借義者如惡曷各反惡烏路反復房六反復扶又反是也醜惡之惡本義也以其醜惡則可憎惡故為憎惡之惡報復之復本義也以其有反報之義故借為復再之復此之謂借義不借音如風蟲之風本義也以其蟲因感吹噓之風而生故又借為吹噓之風如疋足之疋本義也以足有迹象故又借為疋騎之疋此之謂音義俱借凡樵讀書之註以亦或二字立例言亦者與正體同音及同義也言或者借體及借義也其字書謂字家之學以許慎為宗許慎雖知文與字不同故立以攝字然又不知制文字之機故錯説六書也夫文之立有形有象有機有體形者如草木之名所以狀其形所以昭其象機者如一二三亖之文是也體者本無所取義但辨異其體耳如五六七八九是也許慎實不知文有此也字者以母統子則為諧聲子統子母統母則為㑹意許慎之目立四皆母文也如草木之類是母文矣以盧附草為蘆以荻附草為荻以盧附木為櫨以狄附木為梑盧與狄但従草木之類而為之聲音不能自立體者謂之子文故五百四十之中皆無盧狄文也此之謂諧聲凡従蟲者有蟲類凡従皿者有皿類凡従止者有止類凡従戈者有戈類蟲皿止戈皆母文也以蟲合皿為蠱以戈合止為武只是以二母文相合而取其意耳二體既敵無所附従故不曰諧聲而曰㑹意也凡此諸書文字之始制作之由其庶㡬矣雖百家諸子九流異端皆不能惑仲尼之道也又樵于春秋有云有文有字學者不辨文字有史有書學者不辨史書史者官籍也書者儒生之所作也自司馬以來凡作史者皆是書不是史又諸史家各成一代之書而無通體樵欲自今天子中興上逹秦漢之前著為一書曰通史尋紀法制嗚呼三館四庫之中不可謂無書也然欲有法制可為歴代有國家者之紀綱規模實未見其作此非有朝廷之命樵不敢私撰也營營之業㷀㷀之志幸禮部侍郎而成就之因蔡文之命謹内上本草成書五䇿計二十四巻外類一䇿五巻春秋傳二䇿十二巻春秋一䇿十二卷春秋地名一䇿十巻辨詩序妄一䇿百二十七篇餘書或著而未成或成而未寫如韻目錄一巻詩傳四五篇韻字之書極多雖二三人亦未易得也景韋兄過䝉㕘政之知此皆禮部餘論之及也文字别已久為劉守交代次徃徃無暇及此近于六月末方承文字已遣人去潮想歸在旦夕也不宣夾漈遺稿巻二
